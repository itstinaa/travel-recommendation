<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explore Destinations</title>

  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #dc2626;
      --border: rgba(15, 23, 42, 0.12);
      --shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 24px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
    }

    header p {
      margin: 6px 0 0;
      opacity: 0.9;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn,
    .smallBtn {
      border: none;
      cursor: pointer;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
      border-radius: 999px;
    }

    .btn {
      background: white;
      color: var(--primary);
      padding: 10px 16px;
    }

    .btn.danger {
      background: var(--danger);
      color: white;
    }

    .smallBtn {
      background: var(--primary);
      color: white;
      padding: 9px 14px;
      font-size: 14px;
    }

    .smallBtn.secondary {
      background: #e0e7ff;
      color: #1e40af;
    }

    .smallBtn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .container {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 24px;
      align-items: start;
    }

    .panel,
    .resultCard {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 20px;
      position: sticky;
      top: 20px;
    }

    .panel h2 {
      margin-top: 0;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 14px 0 6px;
      font-size: 14px;
    }

    input,
    select {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
      font-size: 14px;
    }

    input:focus,
    select:focus {
      border-color: var(--primary);
    }

    .statusBox {
      background: #e0f2fe;
      color: #075985;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 18px;
      font-weight: bold;
    }

    .results {
      display: grid;
      gap: 16px;
    }

    .resultCard {
      padding: 20px;
    }

    .resultCard h3 {
      margin-top: 0;
      font-size: 22px;
    }

    .resultCard p {
      line-height: 1.5;
    }

    .muted,
    .status {
      color: var(--muted);
      font-size: 14px;
    }

    .resultActions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .tagRow {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0;
    }

    .tag {
      background: #dbeafe;
      color: #1d4ed8;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .wikiBox {
      margin-top: 14px;
    }

    .wiki-card {
      background: #f8fafc;
      border: 1px solid rgba(15, 23, 42, 0.1);
      border-radius: 14px;
      padding: 14px;
    }

    .wiki-card img {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 12px;
    }

    .wiki-card h4 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .wiki-card p {
      font-size: 14px;
      color: #64748b;
    }

    .wiki-card a {
      color: #2563eb;
      font-weight: bold;
      text-decoration: none;
    }

    @media (max-width: 900px) {
      header {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .panel {
        position: static;
      }
    }
  </style>
</head>

<body>
  <header>
    <div>
      <h1>Explore Destinations</h1>
      <p>Get personalised travel recommendations based on your preferences.</p>
    </div>

    <div class="header-actions">
      <a href="/index.html" class="btn">Home</a>
      <a href="/account.html" class="btn">Account</a>
      <button class="btn danger" id="logoutBtn">Logout</button>
    </div>
  </header>

  <main class="container">
    <div class="statusBox" id="msg">Choose your preferences to get recommendations.</div>

    <div class="layout">
      <section class="panel">
        <h2>Your Travel Preferences</h2>

        <form id="prefsForm">
          <label for="budget">Budget</label>
          <select id="budget">
            <option value="">Any budget</option>
            <option value="low">Low</option>
            <option value="mid">Mid</option>
            <option value="high">High</option>
          </select>

          <label for="region">Region</label>
          <select id="region">
            <option value="">Any region</option>
            <option value="africa">Africa</option>
            <option value="americas">Americas</option>
            <option value="asia">Asia</option>
            <option value="europe">Europe</option>
            <option value="oceania">Oceania</option>
          </select>

          <label for="climate">Climate</label>
          <input id="climate" placeholder="e.g. sunny, cold, tropical, temperate">

          <label for="vibe">Vibe</label>
          <select id="vibe">
            <option value="">Any vibe</option>
            <option value="beach">Beach</option>
            <option value="city">City</option>
            <option value="adventure">Adventure</option>
            <option value="nature">Nature</option>
            <option value="luxury">Luxury</option>
            <option value="romantic">Romantic</option>
            <option value="cultural">Cultural</option>
            <option value="relaxation">Relaxation</option>
            <option value="food">Food</option>
          </select>

          <label for="tripType">Trip Type</label>
          <select id="tripType">
            <option value="">Any trip type</option>
            <option value="solo">Solo</option>
            <option value="couple">Couple</option>
            <option value="family">Family</option>
            <option value="friends">Friends</option>
          </select>

          <label for="interests">Interests</label>
          <input id="interests" placeholder="e.g. food, culture, beaches, museums">

          <button type="submit" class="smallBtn" style="margin-top:16px; width:100%;">
            Find Recommendations
          </button>
        </form>
      </section>

      <section>
        <div id="results" class="results"></div>
      </section>
    </div>
  </main>

  <script src="api.js"></script>
  <script src="explore.js"></script>
</body>
</html>
